<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" style="enable-background:new 0 0 30 30;" xml:space="preserve">
<defs>
  <style type="text/css">
    .st194{fill:#1E1E1E;stroke:#E2E8F0;stroke-width:0.8;stroke-miterlimit:10;}
    .st23{fill:#EAB308;} /* Amber-500 yellow color for lightning bolt */

    .bolt-breathe {
      animation: breathe 3s ease-in-out infinite;
      transform-origin: 15px 15px;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.8; transform: scale(0.95); filter: drop-shadow(0 0 2px rgba(234, 179, 8, 0.4)); }
      50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 8px rgba(234, 179, 8, 0.8)); }
    }
  </style>
</defs>

<g>
  <path class="st194" d="M24.51,28.51H5.49c-2.21,0-4-1.79-4-4V5.49c0-2.21,1.79-4,4-4h19.03c2.21,0,4,1.79,4,4v19.03
    C28.51,26.72,26.72,28.51,24.51,28.51z"/>
  <g class="bolt-breathe">
    <!-- Lightning bolt path centered inside 30x30 container -->
    <path class="st23" d="M17.5,5.5 L9.5,15.5 L14.5,15.5 L12.5,24.5 L20.5,14.5 L15.5,14.5 Z"/>
  </g>
</g>
</svg>
